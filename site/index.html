<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature</title>
    <!-- OG_META_START -->
    <meta property="og:title" content="22.5°C — Gisebo 01 Temperature">
    <meta property="og:description" content="Current reading: 22.5°C from sensor Gisebo 01. Live temperature display updated automatically.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://temperature.pages.dev/">
    <meta property="og:image" content="https://temperature.pages.dev/og-11299210efa3.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="22.5°C — Gisebo 01 Temperature">
    <meta name="twitter:description" content="Current reading: 22.5°C from sensor Gisebo 01. Live temperature display updated automatically.">
    <meta name="twitter:image" content="https://temperature.pages.dev/og-11299210efa3.png">
    <!-- OG_META_END -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #90c0de;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0 5%;
        }

        #device-id {
            font-size: 22px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.25em;
        }

        .temperature-display {
            display: flex;
            align-items: baseline;
            max-width: 90%;
        }

        #temperature {
            font-weight: bold;
            font-size: clamp(80px, 22vw, 400px);
            color: #1c7bb7;
            line-height: 1;
        }

        .unit {
            font-size: clamp(35px, 10vw, 180px);
            color: #1c7bb7;
            font-weight: bold;
        }

        #min-max {
            font-size: clamp(14px, 2.5vw, 22px);
            color: rgba(255, 255, 255, 0.85);
            margin-top: 0.4em;
            text-align: center;
        }

        #updated-at {
            font-size: clamp(12px, 2vw, 16px);
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.5em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="device-id"></div>
    <div class="temperature-display">
        <span id="temperature">--</span><span class="unit">&deg;C</span>
    </div>
    <div id="min-max">
        <span id="min-36h">--</span> / <span id="max-36h">--</span> &deg;C (36h)
    </div>
    <div id="updated-at"></div>

    <script>
        function formatTimestamp(isoString) {
            try {
                var date = new Date(isoString);
                if (isNaN(date.getTime())) return isoString;
                return date.toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return isoString;
            }
        }

        function formatAggregate(value) {
            // Render null/undefined as the placeholder dash. Anything
            // numeric is shown as-is. Defensive against stringy values
            // sneaking in from a future schema change.
            if (value === null || value === undefined) return '--';
            return value;
        }

        function updateDisplay(data) {
            // T-023: prefer the pretty-printed display name. Fallback
            // to the raw device_id covers older cached JSON payloads
            // still served from the Cloudflare edge during rollout.
            document.getElementById('device-id').textContent = data.device_name || data.device_id || '';
            document.getElementById('temperature').textContent = data.temperature;
            document.getElementById('min-36h').textContent = formatAggregate(data.min_36h);
            document.getElementById('max-36h').textContent = formatAggregate(data.max_36h);
            document.getElementById('updated-at').textContent = 'Last updated: ' + formatTimestamp(data.time);
            document.title = data.temperature + '\u00B0C';
        }

        function showError() {
            document.getElementById('temperature').textContent = '--';
            document.getElementById('min-36h').textContent = '--';
            document.getElementById('max-36h').textContent = '--';
            document.getElementById('updated-at').textContent = '...';
            document.title = 'Temperature';
        }

        function fetchTemperature() {
            fetch('temperature.json?t=' + Date.now())
                .then(function (response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(function (data) {
                    updateDisplay(data);
                })
                .catch(function () {
                    showError();
                });
        }

        fetchTemperature();
        setInterval(fetchTemperature, 60000);
    </script>
</body>
</html>
